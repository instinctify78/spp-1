services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/runs.db
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite:////app/data/runs.db
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/app/data
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info -Q default -c 1
    # Uncomment to enable GPU pass-through (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
